<!DOCTYPE html>
<html>

<head>

<title>Pressure Surge Detection</title>


<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/luxon"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-luxon"></script>


<style>


body {

font-family: Arial;

margin:40px;

background:#f4f4f4;

}



.container{


background:white;

padding:30px;

border-radius:12px;


}



button,input{


padding:10px;

margin:8px;


}



button{


background:#0066cc;

color:white;

border:none;

border-radius:5px;

cursor:pointer;


}



button:hover{


background:#004999;


}



canvas{


margin-top:30px;


}





/* Progress Overlay */


#loading{


display:none;


position:fixed;


top:0;


left:0;


width:100%;


height:100%;


background:rgba(255,255,255,0.85);


z-index:9999;


text-align:center;


padding-top:200px;


font-size:25px;


color:#0066cc;


}




#progressContainer{


width:60%;


height:35px;


background:#ddd;


margin:auto;


border-radius:20px;


overflow:hidden;


}




#progressBar{


height:100%;


width:0%;


background:#0066cc;


color:white;


line-height:35px;


font-size:18px;


transition:width 0.2s;


}




</style>


</head>



<body>



<div id="loading">


<div id="progressContainer">


<div id="progressBar">

0%

</div>


</div>


<br>


Analysing CSV... Please wait


</div>





<div class="container">



<h1>

Pressure Surge Detection Tool

</h1>




<input

type="file"

id="csvFile"

accept=".csv">



<br>



Pressure jump threshold:


<input

type="number"

id="pressureLimit"

value="1">





<br>




Time gap threshold (seconds):


<input

type="number"

id="timeLimit"

value="1">





<br>




<button onclick="processCSV()">

Analyse CSV

</button>



<button onclick="downloadPNG()">

Download Graph PNG

</button>





<h3 id="result"></h3>




<canvas id="chart"></canvas>




</div>








<script>


let chart=null;





function processCSV(){



document.getElementById("loading").style.display="block";



let file =

document.getElementById("csvFile").files[0];





if(!file){


document.getElementById("loading").style.display="none";


alert("Please upload CSV first");


return;


}






let pressureLimit =

Number(document.getElementById("pressureLimit").value);





let timeLimit =

Number(document.getElementById("timeLimit").value);





let reader=new FileReader();





reader.onload=function(e){





let rows =

e.target.result.trim().split("\n");




let totalRows = rows.length;



let progressBar =

document.getElementById("progressBar");




let data=[];






rows.forEach((row,index)=>{





let progress =

Math.round(((index+1)/totalRows)*100);





progressBar.style.width =

progress+"%";



progressBar.innerHTML =

progress+"%";








let cols=row.split(",");




if(cols.length<3)

return;





let date=cols[0].trim();


let time=cols[1].trim();




let pressure=parseFloat(cols[2]);





let parts=date.split("/");





let cleanTime =


time.replace(

/(\d+:\d+:\d+)\s(AM|PM)\.(\d+)/,

"$1.$3 $2"

);





let dt =


new Date(

parts[2]+"-"+parts[1]+"-"+parts[0]

+" "

+cleanTime

);






if(!isNaN(dt) && !isNaN(pressure)){



data.push({


x:dt,


pressure:pressure



});



}





});








data.sort(

(a,b)=>a.x-b.x

);







let graph=[];


let surgeCount=0;







for(let i=0;i<data.length;i++){



let value=data[i].pressure;





if(i>0){



let pressureChange =

Math.abs(

data[i].pressure-

data[i-1].pressure

);






let timeChange =

(data[i].x-data[i-1].x)/1000;







if(

pressureChange > pressureLimit ||

timeChange > timeLimit

){


value=null;


surgeCount++;


}





}







graph.push({


x:data[i].x,


y:value



});




}







document.getElementById("result").innerHTML =


"Surge boundaries detected: "

+surgeCount;






createGraph(graph);







setTimeout(()=>{


document.getElementById("loading").style.display="none";


progressBar.style.width="0%";


progressBar.innerHTML="0%";



},500);





}





reader.readAsText(file);





}









function createGraph(data){





if(chart){


chart.destroy();


}







chart=new Chart(


document.getElementById("chart"),


{


type:"line",




data:{



datasets:[{


label:"Pressure",


data:data,


borderColor:"blue",


borderWidth:1,


pointRadius:0,


spanGaps:false



}]



},





options:{



responsive:true,




plugins:{



title:{


display:true,


text:"Pressure Surges"


}



},







scales:{



x:{



type:"time",





time:{


unit:"minute",



displayFormats:{


minute:"dd/MM/yyyy HH:mm"


},



tooltipFormat:


"dd/MM/yyyy HH:mm:ss"



},





ticks:{


autoSkip:true,


maxTicksLimit:10


}





},






y:{



title:{


display:true,


text:"Pressure"



}



}



}





}



}



);



}









function downloadPNG(){



if(chart===null){


alert("Please generate the graph first");


return;


}






let link=document.createElement("a");



link.download="Pressure_Surge_Graph.png";



link.href=chart.toBase64Image();



link.click();





}



</script>




</body>

</html>
